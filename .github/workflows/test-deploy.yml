name: test-deploy
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FLUID_SCRIPT: node_modules/@explorable-viz/fluid/script

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: setup
      run: |
        yarn install
        npx install-website article
        cd website/article
        yarn install
    - name: test
      run: |
        cd website/article
        yarn test

  deploy-website:
    runs-on: ubuntu-22.04
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: build
      run: |
        yarn install
        npx install-website article
        cd website/article
        yarn install
        BASE_PATH=/fluid-article yarn build
    - name: gh-pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: website/article/build
        keep_files: false
    - name: test deployed website
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ./$FLUID_SCRIPT/util/test-deployed-website.sh https://explorable-viz.github.io/fluid-article website/article
